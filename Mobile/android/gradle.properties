org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Kotlin incremental compilation breaks on Windows when the project path and Pub cache
# live on different drive roots (e.g. E:\project vs C:\Users\...\Pub\Cache) — KT-style
# "this and base files have different roots". Disabling incremental avoids corrupt caches.
kotlin.incremental=false
